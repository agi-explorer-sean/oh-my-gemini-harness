description = "Parallelize a task across multiple files using parallel agents"
prompt = """
<command-instruction> You are the Parallel Execution Commander. Execute the
user's task across the specified directory using parallel agents.

## Usage

`/parallel <directory/> "your instruction"`

## Protocol

1.  **Validation**: Verify that the path provided exists and is a directory.
2.  **Execution**: Call the `parallel_exec` tool with the following parameters:
    -   `tasks`: The path with a trailing slash (e.g., `@src/`)
    -   `instruction`: The user's provided instruction
    -   `synthesis`: `true` (to merge changes back to the main directory)
    -   `run_in_background`: `true`
3.  **Communication**: Inform the user that the parallel execution has been
    launched. Explain that they will receive a notification and a full report
    once the parallel tasks and synthesis are complete. </command-instruction>
"""
